appId: com.quanzhenpai.creative-engine
productName: "全帧派创作引擎"
copyright: "Copyright © 2026 全帧派影视科技"
directories:
  output: release
  buildResources: public
files:
  - build/**/*
  - data/**/*
  - node_modules/**/*
  - public/**/*
  - package.json
  - "!node_modules/@types/**"
  - "!node_modules/.cache/**"
  - "!node_modules/*/{test,tests,__tests__}/**"
extraResources:
  - from: data/skills
    to: skills
  - from: data/models
    to: models
  - from: public/guo-3d-assets
    to: guo-3d-assets
asar: true
compression: maximum
win:
  target:
    - target: nsis
      arch: [x64]
  icon: public/app-icon.png
  artifactName: "${productName}-${version}-win-x64.${ext}"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/app-icon.png
  uninstallerIcon: public/app-icon.png
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "全帧派创作引擎"
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: public/app-icon.png
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"
  category: public.app-category.creative
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: public/app-icon.png
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
  category: AudioVideo
publish:
  provider: github
  owner: baiyi878290
  repo: quanzhenpai-creative-engine
